<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoLemon Children's Book Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f9f7f2;color:#1a1a2e;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
.sticky-header{background:#1a1a2e;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.header-inner{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-icon{width:34px;height:34px;background:#e8a020;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:#f5c96a}
.badge{background:#e8a020;color:#1a1a2e;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.tabs-bar{background:#2d2d4a;display:flex;overflow-x:auto}
.tabs-inner{max-width:1100px;margin:0 auto;display:flex;width:100%;padding:0 20px}
.tab-btn{background:none;border:none;font-size:13px;padding:12px 16px;white-space:nowrap;transition:all 0.2s;border-bottom:3px solid transparent;color:rgba(255,255,255,0.5);font-weight:500}
.tab-btn.active{color:#e8a020;font-weight:700;border-bottom-color:#e8a020}
.content{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
.section-label{font-family:monospace;font-size:11px;font-weight:500;color:#0e8c7a;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.section-title{font-family:Georgia,serif;font-size:26px;font-weight:900;color:#1a1a2e;margin-bottom:6px}
.section-desc{color:#7a7870;font-size:14px;line-height:1.7;max-width:680px}
.divider{height:3px;background:linear-gradient(90deg,#e8a020,#f5c96a,transparent);border-radius:2px;margin:20px 0}
.card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 16px rgba(26,26,46,0.08)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #e0ddd5}
.card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#1a1a2e}
.card-sub{font-size:12px;color:#7a7870}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:700;color:#2d2d4a;letter-spacing:0.3px}
.field .req{color:#c0392b;margin-left:3px}
.field .hint{font-size:11px;color:#7a7870;font-style:italic}
.inp{background:#f9f7f2;border:1.5px solid #e0ddd5;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a2e;width:100%;outline:none}
.inp:focus{border-color:#0e8c7a}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
select.inp{cursor:pointer}
.info-box{border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:13.5px;line-height:1.65;border-left:4px solid}
.info-teal{background:#e4f5f2;border-color:#0e8c7a}
.info-gold{background:#fdf3e0;border-color:#e8a020}
.info-sky{background:#eaf1fb;border-color:#2563a8}
.info-green{background:#e8f5ee;border-color:#1a7a3e}
.info-purple{background:#f0eaf9;border-color:#5b2d8f}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.style-card{border:2px solid #e0ddd5;background:#fff;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.2s}
.style-card:hover{border-color:#0e8c7a;background:#e4f5f2}
.style-card.selected{border-color:#0e8c7a;background:#e4f5f2}
.style-name{font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:3px}
.style-age{font-size:11px;color:#7a7870;margin-bottom:5px}
.style-desc{font-size:12px;color:#2d2d4a;line-height:1.5}
.progress-bar-wrap{background:#f9f7f2;border:1px solid #e0ddd5;border-radius:4px;height:8px;margin-bottom:6px;overflow:hidden}
.progress-bar{height:100%;background:#0e8c7a;border-radius:4px;transition:width 0.4s}
.progress-label{font-size:12px;color:#7a7870;text-align:right;margin-bottom:16px}
.btn-primary{width:100%;padding:14px 24px;background:linear-gradient(135deg,#0e8c7a,#0a6b5e);color:#fff;border:none;border-radius:10px;font-family:Georgia,serif;font-size:17px;font-weight:700;box-shadow:0 4px 20px rgba(14,140,122,0.35)}
.btn-secondary{padding:10px 20px;border-radius:8px;border:1.5px solid #e0ddd5;background:#f9f7f2;color:#2d2d4a;font-size:14px;font-weight:600}
.btn-teal{padding:10px 20px;border-radius:8px;border:none;background:#0e8c7a;color:#fff;font-size:14px;font-weight:600}
.monospace-box{background:#1a1a2e;color:#e8e6e0;border-radius:12px;padding:22px 24px;font-family:monospace;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:560px;overflow-y:auto;box-shadow:0 8px 40px rgba(26,26,46,0.14)}
.copy-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;border:none;background:#0e8c7a;color:#fff;transition:all 0.2s}
.copy-btn.small{padding:4px 12px;font-size:11px;background:#e4f5f2;color:#0e8c7a;border-radius:5px}
.copy-btn.copied{background:#0e8c7a;color:#fff}
.page-block{background:#fff;border:1px solid #e0ddd5;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(26,26,46,0.07)}
.page-header{background:#2d2d4a;padding:11px 18px;display:flex;align-items:center;gap:12px}
.page-num{background:#e8a020;color:#1a1a2e;font-family:monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;min-width:64px;text-align:center}
.page-title{color:#fff;font-size:13px;font-weight:500;flex:1}
.page-tool-badge{font-size:11px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:4px}
.page-body{padding:20px;display:grid;gap:16px}
.section-label-sm{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.writing-dir-box{background:#f9f7f2;border:1.5px solid #e0ddd5;border-radius:8px;padding:14px 16px;font-family:Georgia,serif;font-size:14px;line-height:1.85;color:#111;white-space:pre-wrap}
.prompt-box{background:#fdf3e0;border:1.5px solid #e8a020;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:12.5px;line-height:1.7;color:#2d2d4a;white-space:pre-wrap}
.director-box{background:#e4f5f2;border:1.5px solid #0e8c7a;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;color:#2d2d4a}
.tool-box{background:#eaf1fb;border:1.5px solid #2563a8;border-radius:8px;padding:12px 14px;font-size:12.5px;line-height:1.65;color:#2d2d4a;white-space:pre-wrap}
.bottom-row{display:flex;gap:12px;margin-top:16px}
.char-lock-box{background:#fdf3e0;border:1.5px solid #e8a020;border-radius:10px;padding:16px 18px;margin-bottom:16px}
.char-lock-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:13.5px;margin-bottom:10px}
.ded-block{background:#fff;border:2px solid #5b2d8f;border-radius:12px;margin-bottom:12px;overflow:hidden}
.ded-header{background:#5b2d8f;padding:11px 18px;display:flex;align-items:center;gap:12px}
.ded-preview{background:#fffdf7;border:1.5px solid #5b2d8f;border-radius:10px;padding:28px 32px;text-align:center;position:relative;overflow:hidden;margin-bottom:6px}
.ded-stripe{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,#5b2d8f,#e8a020,#5b2d8f)}
.ded-eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#5b2d8f;opacity:0.55;margin-bottom:16px}
.ded-text{font-family:Georgia,serif;font-size:15px;line-height:1.9;color:#1a1a2e;font-style:italic;white-space:pre-wrap}
.ded-from{margin-top:18px;font-family:Georgia,serif;font-size:13px;color:#7a7870}
.wf-step{display:flex;gap:16px;background:#fff;border:1px solid #e0ddd5;border-radius:10px;padding:16px 18px;box-shadow:0 2px 10px rgba(26,26,46,0.06);margin-bottom:12px}
.wf-num{min-width:36px;height:36px;background:#0e8c7a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;font-size:16px;flex-shrink:0}
.wf-title{font-family:Georgia,serif;font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.wf-desc{font-size:13.5px;color:#2d2d4a;line-height:1.65;white-space:pre-wrap}
.wf-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.wf-tag{background:#fdf3e0;border:1px solid #e8a020;color:#1a1a2e;font-family:monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.tip-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.tip-card{background:#fff;border:1px solid #e0ddd5;border-radius:10px;padding:14px 16px;box-shadow:0 2px 10px rgba(26,26,46,0.06)}
.tip-icon{font-size:22px;margin-bottom:6px}
.tip-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:5px}
.tip-desc{font-size:12.5px;color:#2d2d4a;line-height:1.6}
.sub-heading{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:12px;margin-top:8px}
@media(max-width:680px){
  .grid-2,.grid-3,.style-grid,.tip-grid{grid-template-columns:1fr}
  .char-lock-grid{grid-template-columns:1fr}
  .content{padding:16px 12px 80px}
}
</style>
</head>
<body>

<div class="sticky-header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-icon">📚</div>
      <div>
        <div class="logo-title">Children's Book Generator</div>
        <div class="logo-sub">NeoLemon AI · Character Consistency Edition</div>
      </div>
    </div>
    <span class="badge">NeoLemon Optimised</span>
  </div>
  <div class="tabs-bar">
    <div class="tabs-inner" id="tabsInner"></div>
  </div>
</div>

<div class="content" id="mainContent"></div>

<script>
// ═══════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════
const STYLE_NAMES = {
  pixar:"Pixar Animation 3D",
  watercolour:"Soft Watercolour Storybook",
  flat2d:"Vibrant 2D Flat Cartoon",
  anime:"Anime / Manga Lite",
  claymation:"Claymation / Chibi",
  scandi:"Minimalist Scandinavian 2D"
};
const STYLES_LIST = [
  {id:"pixar",      label:"✨ Pixar Animation 3D",      age:"Best: Ages 3–8",  desc:"Soft 3D renders, rounded characters, warm studio lighting. Most popular on NeoLemon."},
  {id:"watercolour",label:"🎨 Soft Watercolour",        age:"Best: Ages 2–5",  desc:"Gentle painted feel, translucent washes, hand-painted texture. Classic picture book warmth."},
  {id:"flat2d",     label:"🖍️ Vibrant 2D Flat Cartoon", age:"Best: Ages 3–7",  desc:"Bold outlines, bright flat colours, high contrast. Modern and graphic. Great for action."},
  {id:"anime",      label:"⭐ Anime / Manga Lite",      age:"Best: Ages 4–8",  desc:"Large expressive eyes, clean bright colours, dynamic poses. Kawaii adventure style."},
  {id:"claymation", label:"🧸 Claymation / Chibi",      age:"Best: Ages 2–6",  desc:"Chunky clay-like characters, big heads, small bodies. Extremely cute for toddlers."},
  {id:"scandi",     label:"🌿 Scandinavian Minimal",    age:"Best: Ages 2–4",  desc:"Simple geometric shapes, muted earthy palette. Modern and calm for bedtime stories."},
];
const TABS = ["① Book Brief","② Master Prompt","③ Page Prompts","④ NeoLemon Workflow","⑤ Tips & Tricks"];
const REQUIRED_FIELDS = ["name","age","gender","skin","hair","outfit","personality","favThings","bookLength","tone","theme","setting"];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentTab = 0;
let copiedId = null;
let copiedTimer = null;

let F = {
  name:"",age:"",gender:"",skin:"",hair:"",eye:"",outfit:"",features:"",
  personality:"",favThings:"",favColour:"",favFood:"",favAnimal:"",
  bookLength:"24",tone:"",theme:"",setting:"",lesson:"",suppChars:"",villain:"",specialObj:"",
  selectedStyle:"",palette:"",trimSize:"8×8 inch square",
  printSpec:"300 DPI CMYK for print (NeoLemon free upscale to 2400×3000px)",
  photoUpload:"No photo — text description only",
  dedication:"",dedicationFrom:""
};

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function makeTag(n){ return "@"+(n||"hero").toLowerCase().replace(/\s+/g,"_"); }
function pronoun(g){ return g==="Girl — she/her"?"she":"they"; }
function possessive(g){ return g==="Girl — she/her"?"her":"their"; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nl2br(s){ return esc(s).replace(/\n/g,"<br>"); }

function copyText(text, btnId) {
  navigator.clipboard.writeText(text).then(() => {
    if (copiedTimer) clearTimeout(copiedTimer);
    copiedId = btnId;
    render();
    copiedTimer = setTimeout(() => { copiedId = null; render(); }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    if (copiedTimer) clearTimeout(copiedTimer);
    copiedId = btnId;
    render();
    copiedTimer = setTimeout(() => { copiedId = null; render(); }, 2000);
  });
}

function copyBtn(text, id, small) {
  const active = copiedId === id;
  const label = active ? "✓ Copied!" : (small ? "Copy" : "Copy Prompt");
  const cls = "copy-btn" + (small ? " small" : "") + (active ? " copied" : "");
  const safeText = text.replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\$/g,"\\$");
  return `<button class="${cls}" onclick="copyText(\`${safeText}\`,\`${id}\`)">${label}</button>`;
}

// ═══════════════════════════════════════════════
// STORY BUILDERS
// ═══════════════════════════════════════════════
function buildBase24() {
  const {name,age,gender,skin,hair,eye,outfit,features,personality,favThings,favFood,favAnimal,theme,setting,suppChars,villain,specialObj,lesson,palette,trimSize} = F;
  const tag = makeTag(name); const he = pronoun(gender); const his = possessive(gender);
  const companionRaw = suppChars ? suppChars.split(/[,;]/)[0].trim() : "a new friend";
  const namedMatch = companionRaw.match(/named\s+(\w+)/i); const companionName = namedMatch ? namedMatch[1] : (companionRaw.split(/\s+/)[2] || companionRaw.split(/\s+/)[0]);
  const ctag = makeTag(companionName);
  const n = name || "the hero";
  const vill = villain || "the obstacle";
  const spec = specialObj || "their most important thing";
  const style = STYLE_NAMES[F.selectedStyle] || "Pixar Animation 3D";
  const pal = palette || "bright vibrant colours";
  const trim = trimSize || "8×8 inch square";
  const lock = "LOCKED — same as anchor image throughout book";

  const p = (num,title,writing,tool,action,pos,bg,note) => ({
    n:num, title, writing, tool, action, pos, bg, storyNote:note,
    tag, ctag, companionName, skin, hair, eye, outfit, features, style, pal, trim, lock
  });

  const d = (txt) => "✏️ WRITING DIRECTION — paste the Master Prompt (Tab 2) into Claude to generate actual story text.\n\n" + txt;

  return [
    p("COVER","Title Page",
      d("Invent a title that is specific and surprising — not generic. If "+n+" loves dinosaurs and goes to a food world, try something like \""+n+" and the Great Biscuit Stampede.\" The title should make a stranger laugh or smile. Test it aloud."),
      "Action Editor","standing heroically with a big joyful smile, arms slightly raised in excitement, full body",
      "full body, centre frame, looking at viewer",
      "vibrant cover background evoking the story's world — "+(setting||"the adventure setting")+" — wide, colourful and welcoming",
      "Cover page. Hero at their most exciting. Make it irresistible."),

    p(1,"The World of "+n,
      d("Open mid-action — "+n+" doing something they love, not a bland introduction. Show personality immediately through behaviour, not description. Weave in their love of "+favThings+" organically — it appears as what they are doing, not as a fact stated. End on something that feels slightly off: a hint that the ordinary day is about to crack open."),
      "Action Editor","caught mid-action doing something they love, fully absorbed, eyes bright — completely in their element",
      "full body, slightly left of centre, dynamic and alive",
      n+"'s home — rich with personal detail, objects and colours that reflect who they are",
      "Open mid-action. Show don't tell. Personality before backstory. Hook at the end."),

    p(2,"Something Shifts",
      d("The ordinary world splinters. Something arrives or goes wrong that makes the familiar feel suddenly strange. Do not explain it — just show it landing. Write the surprise with physicality: what does "+n+"'s body do before their brain catches up? End on a single line that makes the reader physically turn the page."),
      "Action Editor","body reacting before brain — a full-body gasp, frozen mid-motion, eyes wide and fixed on something extraordinary",
      "full body, centre frame, caught in the moment of shock",
      "home setting cracked open by something impossible — a glow, an impossible visitor, something that should not be there",
      "Physical reaction before words. The world cracks open. Hard hook at the end."),

    p(3,"No Turning Back",
      d(n+" makes a choice. They do not have to go — but they go anyway. This moment must feel brave, slightly reckless, and completely right for who "+n+" is. Write the departure with energy and a trace of nerves. The last line should sit on the threshold — one foot in each world."),
      "Action Editor","one decisive step forward — nervous excitement all over their face, chin up, ready",
      "full body, dynamic forward-facing pose, the world behind them and something extraordinary ahead",
      "a threshold — the familiar world behind, the unknown glowing ahead",
      "Brave. Reckless. Completely right. On the threshold."),

    p(4,"A World Unlike Any Other",
      d("The adventure world reveals itself. This is the visual centrepiece of the opening act — make it land like a gasp. Use one specific, surprising sensory detail that could not come from anywhere else. Do not list features — describe the single most extraordinary thing and let it imply the rest."),
      "Action Editor","standing small inside something enormous and dazzling — arms slightly out, unable to take it all in",
      "full body, mid-frame, dwarfed beautifully by the world around them",
      "the adventure world in full reveal — "+(setting||"extraordinary and impossible")+" — one specific astonishing detail dominates",
      "Gasp moment. One extraordinary detail. Let it imply the whole world."),

    p(5,"A Voice in the Crowd",
      d("The supporting character arrives — but do not announce them. Let them appear unexpectedly and speak first. Their voice must sound completely different from "+n+"'s. The meeting should feel like a collision, not a greeting — a little awkward, a little funny, already the beginning of something real."),
      "Multi-Character V2",
      tag+" and "+ctag+" in an awkward, charming, slightly surprised first meeting — both uncertain but curious",
      tag+" on the right, "+ctag+" on the left, both caught off-guard and facing each other with wide eyes",
      "an unexpected corner of the adventure world — the meeting feels accidental and fated at once",
      "Collision, not greeting. Different voices. Already complicated. Already interesting."),

    p(6,"The Thing That Has Gone Wrong",
      d("The real problem is revealed — and it is bigger than "+n+" expected. Use "+companionName+"'s account to show the stakes, but keep it vivid and specific rather than expository. End with "+n+" making a commitment that feels genuine — rooted in their specific personality, not just heroism."),
      "Multi-Character V2",
      tag+" listening with absolute focus, expression shifting from curious to determined — this matters now",
      tag+" centre, upright and focused. "+ctag+" gesturing urgently — both fully engaged",
      "the adventure world showing its wound — something visibly wrong or missing in the landscape",
      "Stakes through emotion, not exposition. The commitment is genuine."),

    p(7,"The Plan",
      d(n+" solves problems in a way that is specific to them. Their plan must surprise the reader slightly — it is not the obvious solution. It connects directly to "+favThings+" or their personality. "+companionName+"'s reaction should tell us how unusual and perfect this idea is. End on movement — they are already going."),
      "Action Editor","mid-idea — eyes lit up, one finger in the air, grinning at a thought only they could have had",
      "full body, centre, all energy forward — a plan crystallising in real time",
      "a breathing space in the adventure world — somewhere safe, somewhere to think",
      "Specific, surprising, completely theirs. The plan reveals character."),

    p(8,"Head First",
      d("Into the first real challenge. Do not build up to it — start in the middle of it. "+n+" must use something they know — their skills, their interests, their way of seeing the world. Write the attempt with physical detail and real effort. No easy wins. Leave the outcome uncertain at the page turn."),
      "Action Editor","fully committed, mid-attempt, putting everything into it — effort visible in every part of them",
      "full body, dynamic and unstable — success not yet guaranteed",
      "the first challenge in full — vivid, specific, visually striking",
      "Start in the middle. Real effort. Outcome uncertain at the page turn."),

    p(9,"YES!",
      d("Earned triumph. The win lands because we felt the struggle. One explosive moment of pure joy — physical, loud, shared. "+companionName+" reacts in a way that is specific to their character. Let the celebration be briefly, gloriously excessive. Then a single line that moves the story forward."),
      "Multi-Character V2",
      tag+" and "+ctag+" in full celebration — every part of both of them expressing total joy",
      "both characters full body, celebrating in their own completely different way",
      "the challenge location transformed — the problem solved, light returning, something visibly fixed",
      "Earned triumph. Brief and glorious. Then forward."),

    p(10,"Further In, Further Down",
      d("The world gets stranger and more beautiful as they go deeper. The friendship between "+n+" and "+companionName+" is building — show it through behaviour, not statement. They have stopped being polite and started being real with each other. One moment of genuine warmth — could be funny, could be quiet, could be both."),
      "Multi-Character V2","walking together with the easy rhythm of people becoming friends — not quite in step, which is somehow perfect",
      tag+" and "+ctag+" side by side, both looking ahead, comfortable and alert",
      "a deeper, stranger, more beautiful layer of the adventure world — something new and astonishing",
      "The friendship deepening through behaviour. Wonder and growing unease."),

    p(11,"A Different Kind of Hard",
      d("Second challenge — completely different in nature from the first. If the first was physical, this one is about thinking. "+n+" must draw on a different quality this time. Something almost stops them. The solution should be surprising even to "+n+"."),
      "Action Editor","mid-problem — working hard, brow furrowed, trying something that might not work",

════════════════════════════════════════
YOUR CRAFT STANDARD
════════════════════════════════════════

This book will be read aloud by a parent or carer to a child, possibly hundreds of times. Every sentence must earn its place. Every page must do something — create a feeling, move the story, reveal character. You are not summarising information. You are creating an experience.

Study these two versions of the same page. The first is the kind of flat, generic writing this book must never contain. The second is the standard you are working toward.

❌ DO NOT WRITE LIKE THIS:
"${n} loved ${favThings}. One day, something happened. ${n} was surprised. They decided to go on an adventure."

✓ WRITE LIKE THIS:
"${n} was in the middle of the best part — the absolute best part — when it happened.
CRACK.
${n} looked up slowly.
That was new."

Notice the difference: the good version uses specific rhythm, white space, and mystery. It trusts the reader. It ends on something that makes turning the page feel unavoidable.

════════════════════════════════════════
THE TEN GOLDEN RULES — FOLLOW EVERY ONE
════════════════════════════════════════

RULE 1 — SHOW, NEVER TELL
Do not state what a character feels. Show it through what their body does, what they say, what they notice.
✗ "She was nervous."   ✓ "She wiped her hands on her jeans. Again."

RULE 2 — WEAVE, NEVER LIST
${n}'s love of ${favThings} must appear as story moments, not as facts announced by the narrator. These details are raw ingredients — transform them. Their knowledge of ${favThings} is what saves the day at the crucial moment. Never write "because ${n} loved ${favThings}..." — just let it be the solution, and let the reader make the connection.

RULE 3 — EVERY PAGE NEEDS A HOOK
The last line of every page must make the reader physically compelled to turn it. A question. A shock. A sound. A silence that shouldn't be there.

RULE 4 — DIALOGUE MUST SOUND LIKE A REAL PERSON
Read every line of dialogue aloud before you finalise it.
✗ "I would like some help," said ${companionName} politely.
✓ "${companionName} grabbed ${n}'s arm. 'You have to come. Right now. Please.'"

RULE 5 — VARY YOUR SENTENCES DELIBERATELY
Short sentences create pace and shock. Longer sentences create wonder and breath. Use both.
Action: "SNAP. The bridge broke. They fell."
Wonder: "Below them, spread across the valley like a quilt someone very grand had left behind, the whole kingdom glittered."

RULE 6 — THE VILLAIN MUST BE SYMPATHETIC
The obstacle must have a reason — loneliness, fear, misunderstanding, loss. The resolution comes through ${n}'s empathy or creativity, never through defeat or force.

RULE 7 — THE LESSON IS NEVER STATED
The theme is: "${lesson}". Show it through what ${n} does. The narrator never explains the moral. The character simply lives it.

RULE 8 — USE SOUND, RHYTHM AND WHITE SPACE
WHOMP. FIZZ. CRACKLE. POP. Use onomatopoeia. Use line breaks for emphasis. Let a single word sit on its own line when the story calls for it. The page is also a physical object — silence on the page creates silence in the reading.

RULE 9 — AUSTRALIAN SPELLING AND LANGUAGE THROUGHOUT
colour, favourite, realise, organise, mum, arvo, biscuit, footpath. Never: color, favorite, realize, mom, cookie, sidewalk.

RULE 10 — EDIT BEFORE YOU SUBMIT
Read every page aloud. Cut every word that is not carrying weight. If a sentence could be removed without the story losing anything, remove it. Picture books are poetry — every word is load-bearing.

════════════════════════════════════════
STORY STRUCTURE — ${len} PAGES
════════════════════════════════════════

COVER: Invent a title that is specific and surprising. Test it: would a stranger laugh, smile, or pick up the book based on the title alone?

OPENING — Pages 1–3
Begin mid-action. ${n} is already doing something they love when the story begins. We meet their personality through what they are doing, not through narration. By the end of page 3, something has arrived, broken, appeared, or been discovered that makes going back to normal impossible.

BUILD-UP — Pages 4–8

MIDDLE — Pages 9–${midEnd}
Three distinct challenges, each requiring a different quality from ${n}. Weave in ${favFood !== "not specified" ? favFood : "their favourite things"}, ${favColour !== "not specified" ? favColour : "their favourite colours"} and ${favAnimal !== "not specified" ? favAnimal : "their pet or favourite animal"} as story moments — not inventory items. Include one genuinely funny beat, one moment of real doubt, and one moment where ${n}'s specific knowledge or personality is the only thing that works.

CLIMAX — Pages ${climaxPg}
${n} faces ${villain !== "none specified" ? villain : "the central obstacle"} directly. The solution must come from who ${n} uniquely is. Write in short, percussive sentences. The villain's humanity shows through.

RESOLUTION — Pages ${resPg}
Everything transforms. The lesson is embodied in what ${n} does — never stated. Warm, joyful, specific. Every character has their own moment.

FINAL PAGE
${n} is home. The last image echoes the first page, slightly changed. The final sentence is six words or fewer. It makes the reader smile and believe there is more to come.
